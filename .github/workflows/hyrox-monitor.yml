name: HYROX Relay Monitor

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Check HYROX status
        id: hyrox
        run: |
          script_exit=0
          node scripts/check_hyrox_relay.js > hyrox-result.json || script_exit=$?
          if [ ! -f hyrox-result.json ]; then
            echo "HYROX check did not produce a result file."
            exit "${script_exit}"
          fi
          cat hyrox-result.json
          node -e "const fs=require('fs'); const data=JSON.parse(fs.readFileSync('hyrox-result.json','utf8')); fs.appendFileSync(process.env.GITHUB_OUTPUT, `alert=${data.alert}\nstatus=${data.status}\nsource=${data.source || ''}\n`);"
          if [ "${script_exit}" -eq 1 ]; then
            exit 1
          fi
          if [ "${script_exit}" -eq 2 ]; then
            echo "HYROX status was unknown on this run. Continuing without alert."
          fi

      - name: Send Slack alert
        if: steps.hyrox.outputs.alert == 'true'
        env:
          HYROX_SLACK_WEBHOOK_URL: ${{ secrets.HYROX_SLACK_WEBHOOK_URL }}
        run: |
          node - <<'NODE'
          const fs = require('fs');
          const data = JSON.parse(fs.readFileSync('hyrox-result.json', 'utf8'));
          const webhookUrl = process.env.HYROX_SLACK_WEBHOOK_URL;

          if (!webhookUrl) {
            throw new Error('Missing GitHub Actions secret: HYROX_SLACK_WEBHOOK_URL');
          }

          const text = [
            ':rotating_light: HYROX Incheon Open Women Relay is no longer sold out.',
            data.ticketText,
            `Checked at: ${data.checkedAt}`,
          ].join('\n');

          fetch(webhookUrl, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ text }),
          }).then(async (response) => {
            if (!response.ok) {
              const body = await response.text();
              throw new Error(`Slack webhook failed: ${response.status} ${body}`);
            }
          }).catch((error) => {
            console.error(error);
            process.exit(1);
          });
          NODE
